<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Stress Check-in</title>
<meta name="theme-color" content="#f7f1e4">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Stress">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="topbar-row topbar-row-3col">
      <span></span>
      <h1 id="homeBtn" class="title-btn" role="button" aria-label="Naar startscherm">Check-in</h1>
      <div class="topbar-right">
        <span id="statusDot" class="status-dot" title="Status van vandaag"></span>
        <button id="settingsBtn" class="icon-btn" aria-label="Instellingen">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3.2"/>
            <path d="M12 2.8v2.6M12 18.6v2.6M21.2 12h-2.6M5.4 12H2.8M18.1 5.9l-1.8 1.8M7.7 16.3l-1.8 1.8M18.1 18.1l-1.8-1.8M7.7 7.7 5.9 5.9"/>
          </svg>
        </button>
      </div>
    </div>
  </header>
  <main id="view"></main>
</div>
<script src="app.js"></script>
</body>
</html>
